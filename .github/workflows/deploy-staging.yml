name: Deploy Staging

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      AWS_REGION: ap-south-1
      PROJECT_NAME: daxch
      ENVIRONMENT: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: backend_image
        run: |
          IMAGE_TAG=${GITHUB_SHA::12}
          IMAGE_URI="${{ secrets.ECR_BACKEND_REPOSITORY }}:${IMAGE_TAG}"
          docker build -f backend/Dockerfile -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        id: frontend_image
        run: |
          IMAGE_TAG=${GITHUB_SHA::12}
          IMAGE_URI="${{ secrets.ECR_FRONTEND_REPOSITORY }}:${IMAGE_TAG}"
          docker build -f frontend/Dockerfile --build-arg NEXT_PUBLIC_API_BASE_URL=/api/v1 -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infrastructure
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: |
          RAW_BUCKET="${TF_STATE_BUCKET}"
          TF_STATE_BUCKET="$(printf '%s' "${RAW_BUCKET}" | tr '[:upper:]' '[:lower:]' | sed 's/[[:space:]]//g' | tr -d '"' | sed 's|^s3://||' | sed 's|/.*||')"
          DEFAULT_BUCKET="daxch-terraform-state-264711513534"
          if [ -z "${TF_STATE_BUCKET}" ] || ! printf '%s' "${TF_STATE_BUCKET}" | grep -Eq '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'; then
            echo "TF_STATE_BUCKET secret missing or invalid; using default: ${DEFAULT_BUCKET}"
            TF_STATE_BUCKET="${DEFAULT_BUCKET}"
          else
            echo "Using Terraform state bucket (length ${#TF_STATE_BUCKET})"
          fi
          printf '%s\n' \
            'terraform {' \
            '  backend "s3" {' \
            "    bucket       = \"${TF_STATE_BUCKET}\"" \
            '    key          = "staging/terraform.tfstate"' \
            '    region       = "ap-south-1"' \
            '    use_lockfile = true' \
            '    encrypt      = true' \
            '  }' \
            '}' > backend.tf
          terraform init -input=false

      - name: Terraform apply (staging)
        working-directory: infrastructure
        run: |
          terraform apply -auto-approve \
            -var="environment=${ENVIRONMENT}" \
            -var="db_password=${{ secrets.DB_PASSWORD_STAGING }}" \
            -var="backend_image=${{ steps.backend_image.outputs.image_uri }}" \
            -var="worker_image=${{ steps.backend_image.outputs.image_uri }}" \
            -var="beat_image=${{ steps.backend_image.outputs.image_uri }}" \
            -var="frontend_image=${{ steps.frontend_image.outputs.image_uri }}"

      - name: Run database migrations via ECS
        run: |
          set -euo pipefail
          NAME_PREFIX="${PROJECT_NAME}-${ENVIRONMENT}"
          CLUSTER="${NAME_PREFIX}-cluster"
          SERVICE="${NAME_PREFIX}-backend"
          TASK_DEF="${NAME_PREFIX}-migrate"

          NET_CFG=$(aws ecs describe-services \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --region "${AWS_REGION}" \
            --query 'services[0].networkConfiguration' \
            --output json)

          RUN_RESULT=$(aws ecs run-task \
            --cluster "${CLUSTER}" \
            --task-definition "${TASK_DEF}" \
            --launch-type FARGATE \
            --network-configuration "${NET_CFG}" \
            --region "${AWS_REGION}" \
            --output json)

          FAILURES=$(printf '%s' "${RUN_RESULT}" | jq -r '.failures[]? | "\(.arn // "n/a"): \(.reason)"')
          if [ -n "${FAILURES}" ]; then
            echo "Failed to start migration task:"
            echo "${FAILURES}"
            exit 1
          fi

          TASK_ARN=$(printf '%s' "${RUN_RESULT}" | jq -r '.tasks[0].taskArn')
          echo "Migration task: ${TASK_ARN}"
          aws ecs wait tasks-stopped --cluster "${CLUSTER}" --tasks "${TASK_ARN}" --region "${AWS_REGION}"

          TASK_JSON=$(aws ecs describe-tasks \
            --cluster "${CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --region "${AWS_REGION}" \
            --output json)

          EXIT_CODE=$(printf '%s' "${TASK_JSON}" | jq -r '.tasks[0].containers[] | select(.name=="migrate") | .exitCode // empty')
          STOPPED_REASON=$(printf '%s' "${TASK_JSON}" | jq -r '.tasks[0].stoppedReason // empty')
          CONTAINER_REASON=$(printf '%s' "${TASK_JSON}" | jq -r '.tasks[0].containers[] | select(.name=="migrate") | .reason // empty')

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Migration failed with exit code: ${EXIT_CODE:-<none>}"
            echo "Stopped reason: ${STOPPED_REASON}"
            echo "Container reason: ${CONTAINER_REASON}"
            aws logs tail "/ecs/${NAME_PREFIX}-migrate" --since 30m --region "${AWS_REGION}" || true
            exit 1
          fi
          echo "Migration completed successfully"

      - name: Force ECS rolling deployment
        run: |
          NAME_PREFIX="${PROJECT_NAME}-${ENVIRONMENT}"
          aws ecs update-service --cluster "${NAME_PREFIX}-cluster" --service "${NAME_PREFIX}-backend" --force-new-deployment --region "${AWS_REGION}"
          aws ecs update-service --cluster "${NAME_PREFIX}-cluster" --service "${NAME_PREFIX}-worker" --force-new-deployment --region "${AWS_REGION}"
          aws ecs update-service --cluster "${NAME_PREFIX}-cluster" --service "${NAME_PREFIX}-beat" --force-new-deployment --region "${AWS_REGION}"
          aws ecs update-service --cluster "${NAME_PREFIX}-cluster" --service "${NAME_PREFIX}-frontend" --force-new-deployment --region "${AWS_REGION}"

