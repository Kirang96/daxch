services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: daxch
      POSTGRES_USER: daxch
      POSTGRES_PASSWORD: daxch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    command: celery -A backend.app.agents.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app/backend
    depends_on:
      - db
      - redis

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    command: celery -A backend.app.agents.celery_app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app/backend
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
